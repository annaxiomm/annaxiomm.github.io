<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="styles.css" rel="stylesheet" />
        <title>annaxiomm</title>
    </head>
    <body>
        <div id="container">
            <div id="statusbar">
                <div id="statusleft">
                    <span class="separator">&nbsp;| </span>
                    <span class="green selected">home</span>
                    <span>
                        <a class="blue" href="https://github.com/annaxiomm"
                            >github*</a
                        >
                    </span>
                    <span class="separator">| </span>
                    <span class="purple">[]=</span>
                    <span class="separator">| </span>
                    <span class="white">user@annasite: ~/homepage</span>
                </div>
                <div id="statusright">
                    <span class="yellow"
                        > cpu: <span id="cpuload"></span>%
                    </span>
                    <span class="separator">|&nbsp;</span>
                    <span class="purple"
                        ><span class="icon">󰁼</span> batt: 27% (~1 hour)</span
                    >
                    <span class="separator">|&nbsp;</span>
                    <span class="red" id="clock"></span>
                    <span class="separator">|&nbsp;</span>
                </div>
            </div>
            <div id="main">
                <div id="left">
                    <div class="window"></div>
                </div>
                <div id="right">
                    <div class="window nf">
                        <span class="green">user@website</span>:<span
                            class="blue"
                            >~/homepage</span
                        >
                        $ neofetch
                        <div id="ascii"></div>
                        &nbsp;&nbsp;<span class="red">user</span>@<span
                            class="red"
                            >website</span
                        ><br />
                        &nbsp;&nbsp;------------<br />
                        &nbsp;&nbsp;<span class="red">OS</span>:
                        <span id="nf-os"></span><br />
                        &nbsp;&nbsp;<span class="red">Host</span>:
                        <span id="nf-host"></span><br />
                        &nbsp;&nbsp;<span class="red">Kernel</span>:
                        7.1.2-javascript<br />
                        &nbsp;&nbsp;<span class="red">Uptime</span>:
                        <span id="nf-uptime"></span><br />
                        &nbsp;&nbsp;<span class="red">Shell</span>: bash
                        (web)<br />
                        &nbsp;&nbsp;<span class="red">WM</span>: html<br />
                        &nbsp;&nbsp;<span class="red">Terminal</span>: puppy<br />
                        &nbsp;&nbsp;<span class="red">CPU</span>:
                        <span id="nf-cpu"></span><br />
                        &nbsp;&nbsp;<span class="red">GPU</span>:
                        <span id="nf-gpu"></span><br />
                        &nbsp;&nbsp;<span class="red">Packages</span>:
                        <span id="nf-packages"></span> (pacman)<br /><br />
                        &nbsp;&nbsp;<span class="blackbg"
                            >&nbsp;&nbsp;&nbsp;</span
                        ><span class="redbg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="greenbg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="yellowbg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="bluebg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="purplebg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="turqbg">&nbsp;&nbsp;&nbsp;</span
                        ><span class="whitebg">&nbsp;&nbsp;&nbsp;</span>
                    </div>
                    <div class="window"></div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
